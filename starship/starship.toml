# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ GLOBAL в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
add_newline = true
command_timeout = 500
right_format = "$time"

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ TIME в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[time]
disabled = false
format = "[$time](fg:#9aa5ce)"

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ PROMPT SYMBOL в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[character]
success_symbol = "[пҢғ вқҜ](fg:#7dcfff)"
error_symbol = "[пҢғ вқҜ](fg:#f7768e)"

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ DIRECTORY в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[directory]
style = "fg:#7aa2f7"
truncate_to_repo = false
read_only = " пҖЈ"
format = "[$path$read_only]($style) "

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ GIT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[git_branch]
symbol = "оңҘ "
style = "fg:#bb9af7"
format = "[$symbol$branch]($style) "

[git_status]
style = "fg:#f7768e"
format = "[$all_status$ahead_behind]($style) "

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ GO  в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[golang]
symbol = "оҳ§"
style = "fg:#7dcfff"
format = "[$symbol]($style) "

# HARD detection вҖ” no leaks
detect_files = ["go.mod"]
detect_extensions = []
detect_folders = []

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ SHELL в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[shell]
zsh_indicator = "zsh"
format = "[$indicator](fg:#9aa5ce) "
disabled = true

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ CMD DURATION в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[cmd_duration]
min_time = 800
format = "[$duration](fg:#9aa5ce) "
